    <style>
        :root { --header-h: 70px; --bg-body: #0f172a; --bg-card: #1e293b; --bg-glass: rgba(15, 23, 42, 0.85); --text-main: #f8fafc; --text-muted: #94a3b8; --border: #334155; --search-bg: #334155; --primary: #2563eb; --secondary: #4f46e5; --font-main: 'Plus Jakarta Sans', sans-serif; --shadow: 0 8px 30px rgba(0, 0, 0, 0.3); --glass-blur: blur(20px); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-main); outline: none; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; min-height: 100vh; overflow-x: hidden; background-color: var(--bg-body); color: var(--text-main); display: flex; flex-direction: column; }
        header { position: fixed; top: 0; left: 0; width: 100%; height: var(--header-h); padding: 0 24px; background: var(--bg-glass); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); z-index: 1000; }
        .logo { font-size: 22px; font-weight: 800; background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px; cursor: pointer; text-decoration: none; margin-left: auto; margin-right: auto; }
        .btn-back { color: var(--text-main); font-size: 20px; text-decoration: none; display: flex; align-items: center; gap: 8px; font-weight: 600; width: 40px; }
        .btn-tele { width: 40px; height: 40px; background: #29b6f6; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; text-decoration: none; transition: transform 0.2s; box-shadow: 0 4px 10px rgba(41, 182, 246, 0.3); }
        .main-content { padding-top: calc(var(--header-h) + 40px); padding-bottom: 40px; padding-left: 20px; padding-right: 20px; display: flex; flex: 1; justify-content: center; align-items: center; }
        .download-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 32px; padding: 40px 24px; width: 100%; max-width: 450px; box-shadow: var(--shadow); text-align: center; display: flex; flex-direction: column; align-items: center; }
        .app-icon-wrap { width: 90px; height: 90px; border-radius: 22px; background: var(--search-bg); display: flex; align-items: center; justify-content: center; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border: 1px solid var(--border); }
        .app-icon-wrap i { font-size: 45px; color: var(--primary); }
        .app-title { font-size: 22px; font-weight: 800; line-height: 1.3; margin-bottom: 35px; letter-spacing: -0.5px; color: var(--text-main); }
        .btn-download-main { width: 100%; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border-radius: 20px; padding: 16px; display: flex; align-items: center; justify-content: center; gap: 15px; text-decoration: none; box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3); transition: transform 0.2s; margin-bottom: 20px; }
        .btn-download-main:active { transform: scale(0.96); }
        .btn-download-main i { font-size: 28px; }
        .btn-download-text { display: flex; flex-direction: column; align-items: flex-start; text-align: left; }
        .btn-download-text .main-text { font-size: 18px; font-weight: 800; letter-spacing: -0.3px; }
        .btn-download-text .sub-text { font-size: 12px; font-weight: 500; opacity: 0.85; margin-top: 2px; }
        .action-row { display: flex; width: 100%; gap: 12px; }
        .btn-small { flex: 1; background: var(--border); color: var(--text-main); padding: 12px; border-radius: 16px; text-decoration: none; font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; transition: transform 0.2s; }
        .btn-small:active { transform: scale(0.95); }
        .btn-small.tutorial { background: rgba(255, 255, 255, 0.08); }
        .btn-small.telegram { background: rgba(41, 182, 246, 0.15); color: #29b6f6; }
        .footer { text-align: center; font-size: 12px; font-weight: 500; color: var(--text-muted); padding: 20px; width: 100%; margin-top: auto; }
    </style>
</head>
<body>
    <header>
        <a href="../../" class="btn-back"><i class="fa-solid fa-chevron-left"></i></a>

    <div class="main-content">
        <div class="download-card">

            <h1 class="app-title">1</h1>
            <a href="https://t.me/+xTtKEZ3KXAc5NTY9" class="btn-download-main" target="_blank">
                <i class="fa-solid fa-cloud-arrow-down"></i>
                <div class="btn-download-text">
                    <span class="main-text">Unduh (35.69 KB)</span>
                    <span class="sub-text">Tanggal Upload: 28 Feb 2026</span>
                </div>
            </a>
            <div class="action-row">
                <a href="/tutorials" class="btn-small tutorial"><i class="fa-solid fa-circle-question"></i> Tutorial</a>
                <a href="https://t.me/+xTtKEZ3KXAc5NTY9" class="btn-small telegram" target="_blank"><i class="fa-brands fa-telegram"></i> Telegram</a>
            </div>
        </div>
    </div>
    <div class="footer">© <span id="autoYearFooter"></span> MODORA | All Rights Reserved</div>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const savedColor = localStorage.getItem('modora_color');
            const savedSec = localStorage.getItem('modora_color_sec');
            if(savedColor && savedSec) { document.documentElement.style.setProperty('--primary', savedColor); document.documentElement.style.setProperty('--secondary', savedSec); }
            const savedFont = localStorage.getItem('modora_font');
            if(savedFont) { document.documentElement.style.setProperty('--font-main', savedFont); }
            document.getElementById('autoYearFooter').textContent = new Date().getFullYear();
        });
    </script>
</body>
</html>
