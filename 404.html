<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script type="text/javascript">
        // Mengambil seluruh path dan query (contoh: /games/the-spike)
        var currentPath = window.location.pathname + window.location.search;
        
        // Memaksa browser pindah ke domain baru secara instan bawa path-nya
        window.location.replace("https://modoracore.biz.id" + currentPath);
    </script>
</head>
<body>
    <p>Mengalihkan ke domain baru... Jika tidak berpindah, <a id="redirect-link" href="https://modoracore.biz.id">klik di sini</a>.</p>
    <script type="text/javascript">
        // Antisipasi jika user mematikan javascript, link manual tetap mengarah ke path yg benar
        document.getElementById("redirect-link").href = "https://modoracore.biz.id" + currentPath;
    </script>
</body>
</html>
